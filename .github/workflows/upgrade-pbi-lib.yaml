name: "Update Visual Chart Library"
on:
  workflow_call:
    inputs:
      type:
        required: true
        type: string

jobs:
  update-lib:
    name: "Update ${{ inputs.type }} Library"
    runs-on: "ubuntu-latest"
    env:
      REPO_NAME: ""
      LIB_NAME: ""
      YAML_NAME: ""
      PBIVER: ""

    steps:
    - name: Set name variables
      run: |
        if [ "${{ inputs.type }}" == "SPC" ]; then
          echo "REPO_NAME=PowerBI-SPC" >> $GITHUB_ENV
          echo "LIB_NAME=PBISPC" >> $GITHUB_ENV
          echo "YAML_NAME=spc" >> $GITHUB_ENV
        elif [ "${{ inputs.type }}" == "Funnel" ]; then
          echo "REPO_NAME=PowerBI-Funnels" >> $GITHUB_ENV
          echo "LIB_NAME=PBIFUN" >> $GITHUB_ENV
          echo "YAML_NAME=funnel" >> $GITHUB_ENV
        fi

    - name: Clone ${{ env.REPO_NAME }} Repo
      uses: actions/checkout@v6
      with:
        repository: "AUS-DOH-Safety-and-Quality/${{ env.REPO_NAME }}"
        path: ${{ env.REPO_NAME }}

    - name: Initialise Rollup Config
      run: |
        echo -e "\
          import typescript from '@rollup/plugin-typescript';   \n\
          import nodeResolve from '@rollup/plugin-node-resolve';\n\
          import commonjs from '@rollup/plugin-commonjs';\n\
          import json from '@rollup/plugin-json';\n\
          export default {\n\
            input: 'src/frontend.ts',\n\
            output: {\n\
              format: 'iife',\n\
              name: '${{ env.YAML_NAME }}',\n\
              file: './.tmp/build/${{ env.LIB_NAME }}.js',\n\
              sourcemap: false\n\
            },\n\
            plugins: [\n\
              typescript({ tsconfig: 'tsconfig.json' }),\n\
              json(),\n\
              nodeResolve({ browser: true }),\n\
              commonjs()\n\
            ]\n\
          };\n\
        " > rollup.config.js
      working-directory: ${{ env.REPO_NAME }}

    - name: Install rollup
      run: |
        npm install rollup @rollup/plugin-commonjs @rollup/plugin-json @rollup/plugin-node-resolve @rollup/plugin-typescript
      working-directory: ${{ env.REPO_NAME }}

    - name: Install ${{ env.LIB_NAME }} and Replace Bundle
      run: |
        npm install
        npx rollup --config rollup.config.js --configPlugin typescript
        mv .tmp/build/${{ env.LIB_NAME }}.js ../inst/htmlwidgets/lib/${{ env.LIB_NAME }}
      working-directory: ${{ env.REPO_NAME }}

    - name: Update htmlwidgets YAML config for ${{ env.LIB_NAME }}
      run: |
        PBIVER=$(jq '.visual.version' ${{ env.REPO_NAME }}/pbiviz.json | sed 's/"//g')
        echo "PBIVER=$PBIVER" >> $GITHUB_ENV
        sed -i "/- name: ${{ env.LIB_NAME }}/{n;s/version: .*/version: $PBIVER/;}" inst/htmlwidgets/${{ env.YAML_NAME }}.yaml
        rm -rf ${{ env.REPO_NAME }}
