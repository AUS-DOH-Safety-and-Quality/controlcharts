name: "Update Bundled PBI Visuals"
on:
  workflow_dispatch:
permissions:
  contents: write

jobs:
  update-libs:
    name: "Update Bundled PBI Visuals"
    runs-on: "ubuntu-latest"

    steps:
    - uses: actions/checkout@v6

    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        BRANCH=update-libs-$(echo $RANDOM | md5sum | head -c 10; echo)
        echo "BRANCH=$BRANCH" >> $GITHUB_ENV
        git checkout -b $BRANCH

    - name: Update SPC lib
      id: spc-update
      uses: ./.github/actions/upgrade-pbi-lib
      with:
        type: "SPC"

    - name: Update Funnel lib
      id: funnel-update
      uses: ./.github/actions/upgrade-pbi-lib
      with:
        type: "Funnel"

    - name: Generate PR
      if: steps.spc-update.outputs.visual-updated == 'true' || steps.funnel-update.outputs.visual-updated == 'true'
      run: |
        git push --set-upstream origin ${{ env.BRANCH }}
